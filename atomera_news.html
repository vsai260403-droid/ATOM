<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomera 뉴스 · 촉매 피드</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #0f0f1a;
    --border: #1e2030;
    --text: #e2e8f0;
    --muted: #9ca3af;
    --accent: #6ee7b7;
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --blue: #60a5fa;
    --red: #f87171;
    --green: #34d399;
    --orange: #fb923c;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh; padding: 24px;
  }

  .page-title { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .page-sub { font-size: 12px; color: var(--muted); margin-bottom: 24px; font-family: 'Courier New', monospace; }

  /* ── 필터 바 ── */
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 20px; align-items: center;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Segoe UI', sans-serif;
  }
  .filter-btn:hover { border-color: #3a3a5a; color: var(--text); }
  .filter-btn.active {
    background: #12122a;
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  /* ── 타임라인 ── */
  .timeline {
    position: relative;
    padding-left: 32px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 11px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--accent), var(--border));
    border-radius: 1px;
  }

  .tl-group {
    margin-bottom: 32px;
  }
  .tl-group-title {
    font-size: 13px; font-weight: 700;
    color: var(--muted);
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    position: relative;
  }
  .tl-group-title::before {
    content: '';
    position: absolute;
    left: -28px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--accent);
  }

  .tl-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tl-item:hover { border-color: #3a3a5a; transform: translateX(4px); }
  .tl-item.expanded { border-color: var(--accent); }
  .tl-item::before {
    content: '';
    position: absolute;
    left: -26px;
    top: 20px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }

  .tl-item.catalyst-high::before { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.5); }
  .tl-item.catalyst-medium::before { background: var(--yellow); }
  .tl-item.catalyst-low::before { background: var(--muted); }

  .tl-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .tl-date {
    font-size: 11px; color: var(--muted);
    font-family: 'Courier New', monospace;
    min-width: 80px;
  }
  .tl-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    font-family: 'Courier New', monospace; font-weight: 600;
    flex-shrink: 0;
  }
  .badge-contract { background: #0a2010; color: #34d399; }
  .badge-earnings { background: #1a1200; color: #fbbf24; }
  .badge-tech { background: #0a0a2a; color: #60a5fa; }
  .badge-hire { background: #1a0a2a; color: #a78bfa; }
  .badge-event { background: #1a0a10; color: #fb923c; }
  .badge-filing { background: #0a1a1a; color: #22d3ee; }
  .badge-catalyst { background: #200a10; color: #f87171; }
  .badge-partnership { background: #0a1520; color: #38bdf8; }

  .tl-title {
    font-size: 14px; font-weight: 600;
    color: var(--text);
    margin-left: auto;
    flex: 1;
  }
  .tl-impact {
    font-size: 10px;
    font-family: 'Courier New', monospace;
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .impact-high { background: rgba(52,211,153,0.15); color: #34d399; }
  .impact-medium { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .impact-low { background: rgba(156,163,175,0.15); color: #9ca3af; }

  .tl-body {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .tl-item.expanded .tl-body { display: block; }

  .tl-desc {
    font-size: 12px; color: var(--muted); line-height: 1.7;
    margin-bottom: 8px;
  }
  .tl-analysis {
    background: #0a1a12;
    border-radius: 6px;
    border-left: 2px solid var(--green);
    padding: 8px 12px;
    font-size: 11px;
    color: var(--green);
    line-height: 1.6;
  }
  .tl-analysis-title {
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .tl-arrow {
    float: right;
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .tl-item.expanded .tl-arrow { transform: rotate(180deg); }

  /* ── 촉매 카운트다운 ── */
  .catalyst-section {
    margin-bottom: 28px;
  }
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .catalyst-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .cat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .cat-card.urgent::before { background: linear-gradient(90deg, #f87171, #fb923c); }
  .cat-card.soon::before { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
  .cat-card.upcoming::before { background: linear-gradient(90deg, #34d399, #10b981); }

  .cat-label {
    font-size: 10px; color: var(--muted);
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .cat-title {
    font-size: 15px; font-weight: 700;
    margin-bottom: 4px;
  }
  .cat-countdown {
    font-size: 22px; font-weight: 700;
    font-family: 'Courier New', monospace;
    margin: 8px 0;
  }
  .cat-desc {
    font-size: 11px; color: var(--muted); line-height: 1.6;
  }
  .cat-impact-row {
    display: flex; gap: 8px; margin-top: 8px;
    flex-wrap: wrap;
  }
  .cat-impact-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    font-family: 'Courier New', monospace; font-weight: 600;
  }

  /* ── Pulse 애니메이션 ── */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .pulse { animation: pulse 2s infinite; }

  @media (min-width:641px) { body { zoom: 1.2; } }
</style>
</head>
<body>

<div class="page-title">📰 뉴스 · 촉매 피드</div>

  const grid = document.getElementById('catalystGrid');
  let html = '';

  CATALYSTS.forEach(c => {
    const daysText = c.daysAway <= 30 ? `D-${c.daysAway}` : `~${c.daysAway}일 후`;
    const daysColor = c.daysAway <= 60 ? '#f87171' : c.daysAway <= 120 ? '#fbbf24' : '#34d399';
    const pulseClass = c.daysAway <= 60 ? 'pulse' : '';

    let tagsHtml = '';
    c.tags.forEach(t => {
      tagsHtml += `<span class="cat-impact-tag" style="background:${t.bg};color:${t.color};">${t.text}</span>`;
    });

    html += `
    <div class="cat-card ${c.urgency}">
      <div class="cat-label">${c.expected}</div>
      <div class="cat-title">${c.title}</div>
      <div class="cat-countdown ${pulseClass}" style="color:${daysColor};">${daysText}</div>
      <div class="cat-desc">${c.desc}</div>
      <div class="cat-impact-row">
        <span class="cat-impact-tag" style="background:rgba(${c.impactColor === '#f87171' ? '248,113,113' : c.impactColor === '#34d399' ? '52,211,153' : c.impactColor === '#60a5fa' ? '96,165,250' : c.impactColor === '#a78bfa' ? '167,139,250' : '251,191,36'},0.15); color:${c.impactColor};">영향도: ${c.impact}</span>
        ${tagsHtml}
      </div>
    </div>`;
  });

  grid.innerHTML = html;
}

// === 타임라인 렌더링 ===
function renderTimeline(filter = 'all') {
  const timeline = document.getElementById('timeline');

  // 필터링
  const filtered = filter === 'all' ? EVENTS : EVENTS.filter(e => e.type === filter);

  // 월별 그룹핑
  const groups = {};
  filtered.forEach(e => {
    const monthKey = e.date.substring(0, 7); // YYYY-MM
    if (!groups[monthKey]) groups[monthKey] = [];
    groups[monthKey].push(e);
  });

  const badgeClass = {
    contract: 'badge-contract',
    earnings: 'badge-earnings',
    tech: 'badge-tech',
    hire: 'badge-hire',
    event: 'badge-event',
    filing: 'badge-filing',
    catalyst: 'badge-catalyst',
    partnership: 'badge-partnership',
  };
  const badgeText = {
    contract: '계약/매출',
    earnings: '실적/IR',
    tech: '기술/특허',
    hire: '인재 영입',
    event: '이벤트',
    filing: 'SEC 공시',
    catalyst: '촉매',
    partnership: '파트너십',
  };
  const impactClass = {
    high: 'impact-high',
    medium: 'impact-medium',
    low: 'impact-low',
  };
  const impactText = {
    high: '🔥 HIGH',
    medium: '⚡ MEDIUM',
    low: '📌 LOW',
  };

  const monthNames = {
    '01': '1월', '02': '2월', '03': '3월', '04': '4월',
    '05': '5월', '06': '6월', '07': '7월', '08': '8월',
    '09': '9월', '10': '10월', '11': '11월', '12': '12월',
  };

  let html = '';

  const sortedKeys = Object.keys(groups).sort().reverse();
  sortedKeys.forEach(monthKey => {
    const [year, month] = monthKey.split('-');
    html += `<div class="tl-group">
      <div class="tl-group-title">${year}년 ${monthNames[month]}</div>`;

    groups[monthKey].forEach((e, i) => {
      const itemId = `item-${monthKey}-${i}`;
      html += `
      <div class="tl-item catalyst-${e.catalystLevel}" id="${itemId}" onclick="toggleItem('${itemId}')">
        <span class="tl-arrow">▼</span>
        <div class="tl-header">
          <span class="tl-date">${e.date}</span>
          <span class="tl-badge ${badgeClass[e.type]}">${badgeText[e.type]}</span>
          <span class="tl-title">${e.title}</span>
          <span class="tl-impact ${impactClass[e.impact]}">${impactText[e.impact]}</span>
        </div>
        <div class="tl-body">
          <div class="tl-desc">${e.desc}</div>
          <div class="tl-analysis">
            <div class="tl-analysis-title">📊 투자 분석</div>
            ${e.analysis}
          </div>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  if (filtered.length === 0) {
    html = '<div style="text-align:center;color:var(--muted);padding:40px;">해당 카테고리의 이벤트가 없습니다</div>';
  }

  timeline.innerHTML = html;
}

function toggleItem(id) {
  document.getElementById(id).classList.toggle('expanded');
}

// === 필터 바 이벤트 ===
document.getElementById('filterBar').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderTimeline(e.target.dataset.filter);
  }
});

// === 초기 렌더 ===
renderCatalysts();
renderTimeline();
</script>
