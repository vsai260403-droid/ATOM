<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atomera 리스크 매트릭스</title>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #0f0f1a; --border: #1e2030;
      --text: #e2e8f0; --muted: #9ca3af; --accent: #6ee7b7;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; padding:24px; font-size:15px; }

    .page-title { font-size:22px; font-weight:700; color:#f87171; margin-bottom:4px; }
    .page-sub { font-size:12px; color:var(--muted); margin-bottom:28px; font-family:'Courier New',monospace; }

    /* 매트릭스 */
    .matrix-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
      overflow-x: auto;
    }
    .matrix-title { font-size:13px; color:var(--muted); font-family:'Courier New',monospace; margin-bottom:16px; }

    .matrix-grid {
      display: grid;
      grid-template-columns: 64px repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr) 32px;
      gap: 4px;
      min-width: 480px;
      height: 360px;
    }

    .cell {
      border-radius: 6px;
      position: relative;
      cursor: pointer;
      transition: filter 0.15s;
      display: flex; align-items: center; justify-content: center;
      flex-wrap: wrap; gap: 3px; padding: 4px;
    }
    .cell:hover { filter: brightness(1.3); }
    .cell.low    { background: #0a2010; }
    .cell.medium { background: #1a1800; }
    .cell.high   { background: #1a0800; }
    .cell.critical { background: #200010; }

    .y-label {
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 8px; font-size: 10px; color: var(--muted);
      font-family: 'Courier New', monospace; text-align: right; line-height: 1.3;
    }
    .x-label {
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--muted); font-family: 'Courier New', monospace;
      text-align: center;
    }
    .corner { background: transparent; }

    .risk-bubble {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s;
      border: 2px solid rgba(255,255,255,0.15);
      color: #fff;
      flex-shrink: 0;
    }
    .risk-bubble:hover { transform: scale(1.3); z-index: 10; }

    .axis-y-title {
      writing-mode: vertical-rl; text-orientation: mixed;
      font-size: 11px; color: var(--muted); font-family: 'Courier New', monospace;
      transform: rotate(180deg);
      text-align: center; margin-right: 8px; flex-shrink: 0;
    }
    .matrix-outer { display: flex; gap: 0; }
    .axis-x-title {
      text-align: center; font-size: 11px; color: var(--muted);
      font-family: 'Courier New', monospace; margin-top: 6px;
    }

    /* 범례 */
    .legend-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* 카드 리스트 */
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
    }
    .risk-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .risk-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .risk-card:hover { border-color: #3a3a5a; }
    .risk-card.active { border-color: #6ee7b7; }

    .rc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .rc-num {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .rc-title { font-size: 13px; font-weight: 600; }
    .rc-category { font-size: 10px; color: var(--muted); font-family: 'Courier New', monospace; }
    .rc-body { font-size: 12px; color: var(--muted); line-height: 1.7; }
    .rc-meta { display: flex; gap: 10px; margin-top: 8px; }
    .rc-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 4px;
      font-family: 'Courier New', monospace; font-weight: 600;
    }
    .rc-mitigation {
      margin-top: 8px; padding: 8px 10px;
      background: #0a1a12; border-radius: 6px; border-left: 2px solid #34d399;
      font-size: 11px; color: #6ee7b7; line-height: 1.6;
      display: none;
    }
    .risk-card.active .rc-mitigation { display: block; }
    .rc-arrow { margin-left: auto; font-size: 12px; color: var(--muted); transition: transform 0.2s; }
    .risk-card.active .rc-arrow { transform: rotate(180deg); }

    .score-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }
    .score-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
    }
    .score-label { font-size: 10px; color: var(--muted); font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .score-value { font-size: 22px; font-weight: 700; }
    .score-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="page-title">⚠️ 리스크 매트릭스</div>
  <div class="page-sub">Atomera 투자 리스크 — 확률 × 임팩트 분석 · 클릭 시 대응 전략</div>

  <!-- 요약 -->
  <div class="score-row" id="scoreRow"></div>

  <!-- 매트릭스 -->
  <div class="matrix-wrap">
    <div class="matrix-title">리스크 포지셔닝 매트릭스 (확률 낮음→높음 / 임팩트 낮음→높음)</div>
    <div class="matrix-outer">
      <div class="axis-y-title">임팩트 (주가 영향) →</div>
      <div style="flex:1">
        <div class="matrix-grid" id="matrixGrid"></div>
        <div class="axis-x-title">← 발생 확률 →</div>
        <div class="legend-row" id="legendRow"></div>
      </div>
    </div>
  </div>

  <!-- 카드 -->
  <div class="section-title">리스크 상세 분석</div>
  <div class="risk-cards" id="riskCards"></div>

<script>
const RISKS = [
  {
    id: 1, short: 'R1',
    title: '삼성 GAA 계약 지연/실패',
    category: '파이프라인 리스크',
    prob: 3,   // 1~5 (높을수록 확률 높음)
    impact: 5, // 1~5 (높을수록 임팩트 큼)
    desc: '삼성이 Phase 4 평가를 완료하고도 수율·비용 문제로 MST 채택을 기각. 현재 주가 상승 기대의 핵심 드라이버가 소멸.',
    mitigation: '三星 JDA2 계약 체결(2024) 자체가 진지한 검토 증거. 공정 전환 압박(`GAA 경쟁 심화`)이 채택 유인. Phase 4 완료 = 양산 검토 단계로 이미 진입.',
    color: '#f87171', bgColor: '#200a0a'
  },
  {
    id: 2, short: 'R2',
    title: '현금 소진 / 추가 희석',
    category: '재무 리스크',
    prob: 4,
    impact: 4,
    desc: '연간 $8~10M 연구개발비 지출. 상업 매출 본격화 전까지 분기마다 주식 발행 가능성. 2026년 $25M 자금조달 완료했으나 향후 필요 시 희석 불가피.',
    mitigation: '2026 Q1 $25M 조달로 ~2~3년 런웨이 확보. 첫 상업매출 발생 중($50~100K). 대형 계약 체결 시 현금 우려 급감.',
    color: '#fb923c', bgColor: '#1a0e00'
  },
  {
    id: 3, short: 'R3',
    title: '기술 경쟁 열위 (대안 기술)',
    category: '기술 리스크',
    prob: 2,
    impact: 5,
    desc: '경쟁사(Intel, TSMC 자체 R&D)가 MST와 동등한 성능 개선을 다른 방식으로 달성. 채택 필요성 소멸.',
    mitigation: '미국 특허 100+ 보유, IP 해자 강력. GAA 공정에서 MST는 채널 이동도 개선 방식이 비교 불가. 삼성·Intel 같은 고객이 직접 JDA를 제안한 것 자체가 기술 우위 방증.',
    color: '#f87171', bgColor: '#200a0a'
  },
  {
    id: 4, short: 'R4',
    title: 'Infineon 매출 성장 정체',
    category: '상업화 리스크',
    prob: 3,
    impact: 3,
    desc: 'Infineon GaN 라인에서 MST 적용 웨이퍼 출하량이 기대보다 느리게 증가. 초기 상업매출이 소액에 그침.',
    mitigation: '현재 이미 매출 발생 중. Synopsys GaN PDK 통합으로 설계 생태계 확장 중. GaN 시장 자체의 구조적 성장(전기차·전력변환).',
    color: '#fbbf24', bgColor: '#1a1200'
  },
  {
    id: 5, short: 'R5',
    title: '반도체 경기 침체',
    category: '거시경제 리스크',
    prob: 3,
    impact: 3,
    desc: '반도체 다운사이클 진입 시 파운드리 CAPEX 축소, 신공정 도입 지연. 고객사 MST 채택 결정 미루기 가능.',
    mitigation: 'IP 라이선싱 비즈니스는 설비투자 없이 계약 기반 매출. 불황기에도 기존 계약 매출 유지. 삼성 18A 경쟁 압박은 사이클 무관.',
    color: '#fbbf24', bgColor: '#1a1200'
  },
  {
    id: 6, short: 'R6',
    title: '핵심 인력 이탈',
    category: '운영 리스크',
    prob: 2,
    impact: 4,
    desc: 'Scott Bibaud CEO 또는 핵심 기술팀 이탈. 소수 정예 조직(직원 ~30명)에서는 충격이 큼.',
    mitigation: 'Wei Na(전 Applied Materials) 영입(2025)으로 고객 네트워크 강화. IP·기술 자산은 회사에 귀속. 스톡옵션으로 핵심인력 유지.',
    color: '#fb923c', bgColor: '#1a0e00'
  },
  {
    id: 7, short: 'R7',
    title: 'TSMC 채택 장기화',
    category: '파이프라인 리스크',
    prob: 4,
    impact: 2,
    desc: 'TSMC는 현재 Phase 1~2 초기 단계. 의사결정 구조상 외부 IP 채택에 극히 보수적. 2nm 이후로 지연 가능.',
    mitigation: '이미 알려진 리스크. 삼성·Intel 계약 체결 시 TSMC 압박 효과. TSMC 채택은 장기 옵션으로 인식.',
    color: '#34d399', bgColor: '#0a1a10'
  },
  {
    id: 8, short: 'R8',
    title: '특허 무효 소송',
    category: '법률 리스크',
    prob: 2,
    impact: 3,
    desc: '대형 파운드리가 MST 특허 무효화 시도. IP 기업의 구조적 리스크.',
    mitigation: '100+ 특허 포트폴리오로 단일 특허 의존 없음. 미국·유럽·일본 다국적 특허 등록. JDA 계약 체결 기업은 소송 유인 낮음.',
    color: '#60a5fa', bgColor: '#0a1020'
  },
];

// 색상 기준
function riskLevel(p, i) {
  const score = p * i;
  if (score >= 15) return 'critical';
  if (score >= 9) return 'high';
  if (score >= 4) return 'medium';
  return 'low';
}
function levelColor(level) {
  return level === 'critical' ? '#f87171' : level === 'high' ? '#fb923c' : level === 'medium' ? '#fbbf24' : '#34d399';
}
function levelBg(level) {
  return level === 'critical' ? '#200a0a' : level === 'high' ? '#1a0e00' : level === 'medium' ? '#1a1200' : '#0a1a10';
}
function levelLabel(level) {
  return level === 'critical' ? '위험' : level === 'high' ? '높음' : level === 'medium' ? '보통' : '낮음';
}

// 요약 카드
const levels = RISKS.map(r => riskLevel(r.prob, r.impact));
const scoreRow = document.getElementById('scoreRow');
const counts = {critical:0, high:0, medium:0, low:0};
levels.forEach(l => counts[l]++);
Object.entries({critical:'위험', high:'높음', medium:'보통', low:'낮음'}).forEach(([k, label]) => {
  const c = document.createElement('div');
  c.className = 'score-card';
  c.innerHTML = `
    <div class="score-label">${label} 리스크</div>
    <div class="score-value" style="color:${levelColor(k)}">${counts[k]}건</div>
    <div class="score-sub">${k === 'critical' ? '즉각 모니터링' : k === 'high' ? '주의 필요' : k === 'medium' ? '관리 중' : '허용 범위'}</div>
  `;
  scoreRow.appendChild(c);
});

// 매트릭스 그리드
const grid = document.getElementById('matrixGrid');
// 5개 행 (임팩트 5→1), 5개 열 (확률 1→5) + y레이블
const yLabels = ['매우 큼', '큼', '보통', '작음', '매우 작음'];
const xLabels = ['매우 낮음', '낮음', '보통', '높음', '매우 높음'];

// 코너
const corner = document.createElement('div'); corner.className = 'corner'; grid.appendChild(corner);
// x 레이블 행 제목 (빈 셀)
xLabels.forEach(l => {
  // 먼저 위에 헤더 없음, 아래에 붙임
});

for (let row = 5; row >= 1; row--) {
  // y레이블
  const yl = document.createElement('div');
  yl.className = 'y-label';
  yl.textContent = yLabels[5 - row];
  grid.appendChild(yl);

  for (let col = 1; col <= 5; col++) {
    const cell = document.createElement('div');
    const lv = riskLevel(col, row);
    cell.className = 'cell ' + lv;
    cell.dataset.prob = col;
    cell.dataset.impact = row;

    // 리스크 버블 배치
    RISKS.forEach(r => {
      if (r.prob === col && r.impact === row) {
        const b = document.createElement('div');
        b.className = 'risk-bubble';
        b.style.background = r.color + '33';
        b.style.borderColor = r.color;
        b.style.color = r.color;
        b.textContent = r.short;
        b.title = r.title;
        b.onclick = (e) => { e.stopPropagation(); scrollToCard(r.id); };
        cell.appendChild(b);
      }
    });
    grid.appendChild(cell);
  }
}

// x 레이블 행
const cornerB = document.createElement('div'); cornerB.className = 'x-label'; grid.appendChild(cornerB);
xLabels.forEach(l => {
  const xl = document.createElement('div');
  xl.className = 'x-label';
  xl.textContent = l;
  grid.appendChild(xl);
});

// 범례
const legendRow = document.getElementById('legendRow');
[{l:'critical',t:'위험 (즉각 대응)'},{l:'high',t:'높음 (주의)'},{l:'medium',t:'보통 (관리)'},{l:'low',t:'낮음 (허용)'}].forEach(({l,t}) => {
  legendRow.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${levelColor(l)}"></div><span>${t}</span></div>`;
});

// 리스크 카드
const cardsEl = document.getElementById('riskCards');
RISKS.forEach(r => {
  const lv = riskLevel(r.prob, r.impact);
  const card = document.createElement('div');
  card.className = 'risk-card';
  card.id = 'rcard-' + r.id;
  card.innerHTML = `
    <div class="rc-header">
      <div class="rc-num" style="background:${r.color}22;color:${r.color};border:1px solid ${r.color}44">${r.short}</div>
      <div>
        <div class="rc-title">${r.title}</div>
        <div class="rc-category">${r.category}</div>
      </div>
      <div class="rc-arrow">▼</div>
    </div>
    <div class="rc-body">${r.desc}</div>
    <div class="rc-meta">
      <span class="rc-badge" style="background:${levelBg(lv)};color:${levelColor(lv)}">
        ${levelLabel(lv)} 리스크
      </span>
      <span class="rc-badge" style="background:#12121e;color:var(--muted)">확률 ${r.prob}/5</span>
      <span class="rc-badge" style="background:#12121e;color:var(--muted)">임팩트 ${r.impact}/5</span>
    </div>
    <div class="rc-mitigation">💡 대응 전략: ${r.mitigation}</div>
  `;
  card.onclick = () => {
    card.classList.toggle('active');
  };
  cardsEl.appendChild(card);
});

function scrollToCard(id) {
  const el = document.getElementById('rcard-' + id);
  if (el) {
    el.scrollIntoView({behavior:'smooth', block:'center'});
    el.classList.add('active');
  }
}
</script>
</body>
</html>
