    RISKS.forEach(r => {

        const b = document.createElement('div');
        b.className = 'risk-bubble';
        b.style.background = r.color + '33';
        b.style.borderColor = r.color;
        b.style.color = r.color;
        b.textContent = r.short;
        b.title = r.title;
        b.onclick = (e) => { e.stopPropagation(); scrollToCard(r.id); };
        cell.appendChild(b);
      }
    });
    grid.appendChild(cell);
  }
}

// x ?пҝҪмқҙпҝҪ???
const cornerB = document.createElement('div'); cornerB.className = 'x-label'; grid.appendChild(cornerB);
xLabels.forEach(l => {
  const xl = document.createElement('div');
  xl.className = 'x-label';
  xl.textContent = l;
  grid.appendChild(xl);
});

// лІ”пҝҪ?
const legendRow = document.getElementById('legendRow');
[{l:'critical',t:'?пҝҪн—ҳ (мҰүк°Ғ ?пҝҪ??'},{l:'high',t:'?пҝҪмқҢ (мЈјмқҳ)'},{l:'medium',t:'ліҙнҶө (кҙҖпҝҪ?'},{l:'low',t:'??пҝҪпҝҪ (?пҝҪмҡ©)'}].forEach(({l,t}) => {
  legendRow.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${levelColor(l)}"></div><span>${t}</span></div>`;
});

// лҰ¬мҠӨ??м№ҙл“ң
const cardsEl = document.getElementById('riskCards');
RISKS.forEach(r => {
  const lv = riskLevel(r.prob, r.impact);
  const card = document.createElement('div');
  card.className = 'risk-card';
  card.id = 'rcard-' + r.id;
  card.innerHTML = `
    <div class="rc-header">
      <div class="rc-num" style="background:${r.color}22;color:${r.color};border:1px solid ${r.color}44">${r.short}</div>
      <div>
        <div class="rc-title">${r.title}</div>
        <div class="rc-category">${r.category}</div>
      </div>
      <div class="rc-arrow">??/div>
    </div>
    <div class="rc-body">${r.desc}</div>
    <div class="rc-meta">
      <span class="rc-badge" style="background:${levelBg(lv)};color:${levelColor(lv)}">
        ${levelLabel(lv)} лҰ¬мҠӨ??
      </span>
      <span class="rc-badge" style="background:#12121e;color:var(--muted)">?пҝҪлҘ  ${r.prob}/5</span>
      <span class="rc-badge" style="background:#12121e;color:var(--muted)">?пҝҪнҢ©??${r.impact}/5</span>
    </div>
    <div class="rc-mitigation">?пҝҪпҝҪ ?пҝҪ???пҝҪлһө: ${r.mitigation}</div>
  `;
  card.onclick = () => {
    card.classList.toggle('active');
  };
  cardsEl.appendChild(card);
});

function scrollToCard(id) {
  const el = document.getElementById('rcard-' + id);
  if (el) {
    el.scrollIntoView({behavior:'smooth', block:'center'});
    el.classList.add('active');
  }
}
</script>
