  <style>
    :root {
      --bg: #0a0a0f; --surface: #0f0f1a; --border: #1e2030;
      --text: #e2e8f0; --muted: #9ca3af; --accent: #6ee7b7;
      --yellow: #fbbf24; --purple: #a78bfa; --blue: #60a5fa;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; padding:24px; font-size:14px; }

    .page-title { font-size:22px; font-weight:700; color:var(--accent); margin-bottom:4px; }
    .page-sub { font-size:12px; color:var(--muted); margin-bottom:28px; font-family:'Courier New',monospace; }

    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    @media(max-width:700px){ .two-col { grid-template-columns:1fr; } }

    .panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:20px;
    }
    .panel-title {
      font-size:12px; font-weight:700; color:var(--muted);
      text-transform:uppercase; letter-spacing:1px; margin-bottom:16px;
      font-family:'Courier New',monospace;
    }

    .input-group { margin-bottom:14px; }
    .input-label {
      font-size:13px; color:var(--muted); margin-bottom:6px;
      font-family:'Courier New',monospace; display:flex; align-items:center; gap:6px;
    }
    .input-label .hint {
      font-size:12px; color:#374151; background:#12121e;
      padding:1px 6px; border-radius:3px;
    }
    .input-row { display:flex; align-items:center; gap:8px; }
    input[type=range] {
      flex:1; -webkit-appearance:none; height:4px;
      background:#1e2030; border-radius:2px; outline:none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:16px; height:16px;
      border-radius:50%; background:var(--accent); cursor:pointer;
    }
    input[type=number] {
      background:#12121e; border:1px solid var(--border); color:var(--text);
      padding:6px 10px; border-radius:6px; font-size:13px;
      font-family:'Courier New',monospace; width:110px; text-align:right;
    }
    input[type=number]:focus { outline:none; border-color:var(--accent); }
    .unit { font-size:13px; color:var(--muted); font-family:'Courier New',monospace; white-space:nowrap; }

    /* кІ°кіј */
    .result-big {
      font-size:32px; font-weight:700; color:var(--accent);
      font-family:'Courier New',monospace; margin:8px 0 2px;
    }
    .result-sub { font-size:13px; color:var(--muted); font-family:'Courier New',monospace; }

    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
    .stat-item { background:#12121e; border-radius:8px; padding:10px 12px; }
    .stat-label { font-size:12px; color:var(--muted); font-family:'Courier New',monospace; margin-bottom:4px; }
    .stat-value { font-size:16px; font-weight:700; font-family:'Courier New',monospace; }

    /* ?пҝҪмқө ?пҝҪлҰ„ */
    .flow-box {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:20px; margin-bottom:20px;
    }
    .flow-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; font-family:'Courier New',monospace; }
    .flow-rows { display:flex; flex-direction:column; gap:10px; }
    .flow-row { display:flex; align-items:center; gap:10px; }
    .flow-label { font-size:12px; color:var(--muted); width:160px; flex-shrink:0; }
    .flow-bar-bg { flex:1; background:#12121e; border-radius:4px; height:20px; overflow:hidden; position:relative; }
    .flow-bar-fill { height:100%; border-radius:4px; transition:width 0.5s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; }
    .flow-bar-val { font-size:13px; font-weight:700; font-family:'Courier New',monospace; color:#fff; white-space:nowrap; }
    .flow-amount { font-size:12px; font-family:'Courier New',monospace; width:90px; text-align:right; flex-shrink:0; }

    /* л№„көҗ ??*/
    .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .tab-btn {
      padding:6px 14px; border-radius:6px; font-size:12px;
      cursor:pointer; font-family:'Courier New',monospace;
      border:1px solid var(--border); background:#12121e; color:var(--muted);
      transition:all 0.15s;
    }
    .tab-btn.active { background:var(--accent); color:#0a0a0f; border-color:var(--accent); font-weight:700; }

    /* мұ„мӮ°??л©”мӢңм§Җ */
    .viability {
      padding:12px 16px; border-radius:8px; margin-top:14px;
      font-size:12px; line-height:1.7;
    }
    .viability.good { background:#0a2010; border:1px solid #34d399; color:#6ee7b7; }
    .viability.warn { background:#1a1200; border:1px solid #fbbf24; color:#fbbf24; }

    .note { font-size:13px; color:var(--muted); font-family:'Courier New',monospace; margin-top:20px; line-height:1.7; }

    /* л°ҳмқ‘??лЎңм—ҙ??кі„мӮ° */
    .royalty-explain {
      background:#12121e; border-radius:8px; padding:12px 14px;
      font-size:13px; color:var(--muted); font-family:'Courier New',monospace;
      line-height:1.8; margin-top:12px;
    }
    .royalty-explain .hl { color:var(--accent); font-weight:700; }
  </style>
</head>
<body>

  <!-- ?пҝҪлҰ¬????-->

        <div class="input-label">?пҝҪмқҙ???пҝҪпҝҪ? (ASP) <span class="hint">кіөм • ліөмһЎ?пҝҪм—җ ?пҝҪлқј ?пҝҪмқҙ</span></div>
        <div class="input-row">
          <input type="range" id="waspSlider" min="100" max="20000" step="100" value="500" oninput="syncInput('wasp','waspSlider');calc()">
          <input type="number" id="wasp" value="500" min="100" max="20000" step="100" oninput="syncSlider('wasp','waspSlider');calc()">
          <div class="unit">USD/??/div>
        </div>
      </div>

      <div class="input-group">
        <div class="input-label">?пҝҪк°„ ?пҝҪмқҙ???пҝҪмӮ°??<span class="hint">WSPM</span></div>
        <div class="input-row">
          <input type="range" id="wspmSlider" min="1000" max="200000" step="1000" value="10000" oninput="syncInput('wspm','wspmSlider');calc()">
          <input type="number" id="wspm" value="10000" min="1000" max="200000" step="1000" oninput="syncSlider('wspm','wspmSlider');calc()">
          <div class="unit">????/div>
        </div>
      </div>

      <div class="input-group">
        <div class="input-label">MST ?пҝҪмһ… л№„мңЁ (?пҝҪмІҙ ?пҝҪмқё пҝҪ?</div>
        <div class="input-row">
          <input type="range" id="adoptSlider" min="1" max="100" step="1" value="20" oninput="syncInput('adopt','adoptSlider');calc()">
          <input type="number" id="adopt" value="20" min="1" max="100" step="1" oninput="syncSlider('adopt','adoptSlider');calc()">

      <div class="input-group">

        <div class="input-row">
          <input type="range" id="yieldSlider" min="0" max="20" step="0.5" value="5" oninput="syncInput('yld','yieldSlider');calc()">
          <input type="number" id="yld" value="5" min="0" max="20" step="0.5" oninput="syncSlider('yld','yieldSlider');calc()">

        <div class="input-row">
          <input type="range" id="perfSlider" min="0" max="30" step="0.5" value="8" oninput="syncInput('perf','perfSlider');calc()">
          <input type="number" id="perf" value="8" min="0" max="30" step="0.5" oninput="syncSlider('perf','perfSlider');calc()">
          <div class="unit">%??/div>

        <div class="input-label">Atomera лЎңм—ҙ?пҝҪмңЁ <span class="hint">?пҝҪмқҙ??ASP кё°пҝҪ?</span></div>
        <div class="input-row">
          <input type="range" id="roySlider" min="0.1" max="3.0" step="0.1" value="1.0" oninput="syncInput('roy','roySlider');calc()">
          <input type="number" id="roy" value="1.0" min="0.1" max="3.0" step="0.1" oninput="syncSlider('roy','roySlider');calc()">

    <!-- кІ°кіј ?пҝҪл„җ -->

      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-label">MST ?пҝҪмҡ© ?пҝҪк°„ л§Өм¶ң</div>
          <div class="stat-value" id="mstRevMonth" style="color:var(--blue)">??/div>
        </div>
        <div class="stat-item">
          <div class="stat-label">?пҝҪмңЁ к°ңм„  ?пҝҪмқө (??</div>

        </div>
        <div class="stat-item">
          <div class="stat-label">???пҝҪмқө кё°м—¬ (??</div>

        </div>

  <!-- ?пҝҪмқө ?пҝҪлҰ„ пҝҪ?-->

  <div class="panel" style="margin-bottom:20px">

    <div id="companyTable" style="overflow-x:auto"></div>

  <div class="note" id="noteEl"></div>

<script>
const PRESETS = {
  power: { wasp:500, wspm:10000, adopt:80, yld:8, perf:12, roy:1.5,
    label:'Power л°ҳлҸ„пҝҪ?(STM/Infineon кё°пҝҪ?)' },
  gaa:  { wasp:8000, wspm:50000, adopt:30, yld:5, perf:8, roy:0.8,
    label:'GAA ?пҝҪмҡҙ?пҝҪлҰ¬ (?пҝҪм„ұ кё°пҝҪ?)' },
  dram: { wasp:3000, wspm:80000, adopt:40, yld:4, perf:6, roy:0.5,
    label:'DRAM (Micron кё°пҝҪ?)' },
  custom: null,
};

const COMPANIES = [
  { name:'STM (Power)',    wasp:500,  wspm:10000, adopt:80, label:'Phase 5В·?пҝҪм—…л§Өм¶ң пҝҪ? },
  { name:'Infineon (GaN)', wasp:600,  wspm:6000,  adopt:20, label:'?пҝҪм—…л§Өм¶ң пҝҪ? },
  { name:'Samsung GAA',   wasp:8000, wspm:50000, adopt:30, label:'Phase 4В·мөңк·ј?? },
  { name:'Intel GAA',     wasp:7000, wspm:30000, adopt:20, label:'?пҝҪпҝҪ? пҝҪ? },
  { name:'Micron DRAM',   wasp:3000, wspm:80000, adopt:35, label:'?пҝҪпҝҪ? пҝҪ? },
  { name:'TSMC GAA',      wasp:15000,wspm:150000,adopt:20, label:'мҙҲкё° ?пҝҪкі„' },
];

let activePreset = 'power';

function applyPreset(key) {
  activePreset = key;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['power','gaa','dram','custom'][i] === key);
  });
  if (!PRESETS[key]) return;
  const p = PRESETS[key];
  ['wasp','wspm','adopt','yld','perf','roy'].forEach(id => {
    const key2 = id === 'yld' ? 'yld' : id === 'perf' ? 'perf' : id;
    document.getElementById(id).value = p[id === 'yld' ? 'yld' : id === 'perf' ? 'perf' : id];
    const slider = document.getElementById(id + 'Slider');
    if (slider) slider.value = document.getElementById(id).value;
  });
  calc();
}

function syncInput(inputId, sliderId) {
  document.getElementById(inputId).value = document.getElementById(sliderId).value;
}
function syncSlider(inputId, sliderId) {
  document.getElementById(sliderId).value = document.getElementById(inputId).value;
}

function fmt(v) {
  if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(1) + 'K';
  return '$' + v.toFixed(0);
}

function calc() {
  const wasp   = parseFloat(document.getElementById('wasp').value) || 0;
  const wspm   = parseFloat(document.getElementById('wspm').value) || 0;
  const adopt  = parseFloat(document.getElementById('adopt').value) / 100 || 0;
  const yld    = parseFloat(document.getElementById('yld').value) / 100 || 0;
  const perf   = parseFloat(document.getElementById('perf').value) / 100 || 0;
  const roy    = parseFloat(document.getElementById('roy').value) / 100 || 0;

  // MST ?пҝҪмҡ© ?пҝҪмқҙ????
  const mstWafers = wspm * adopt;

  // л§Өм¶ң (??
  const mstRevMonth = mstWafers * wasp;

  // ?пҝҪмңЁ к°ңм„  ?пҝҪмқө: ?пҝҪмқј ?пҝҪмһ… ?пҝҪпҝҪ????????пҝҪлҠ” ?пҝҪмқҙ??к°ҖпҝҪ?
  const yieldGainMonth = mstRevMonth * yld;

  // лЎңм—ҙ??(??
  const royMonthly = mstRevMonth * roy;

  // ???пҝҪмқө кё°м—¬ (?пҝҪмңЁ ?пҝҪмқө - лЎңм—ҙ??
  const netGainMonth = yieldGainMonth - royMonthly;

  // ?пҝҪк°„
  const royAnnual = royMonthly * 12;
  const yieldAnnual = yieldGainMonth * 12;
  const netAnnual = netGainMonth * 12;

  document.getElementById('mstRevMonth').textContent = fmt(mstRevMonth);
  document.getElementById('yieldGainMonth').textContent = fmt(yieldGainMonth);
  document.getElementById('royMonthly').textContent = fmt(royMonthly);
  document.getElementById('netGainMonth').textContent = fmt(netGainMonth);

  document.getElementById('royAnnual').textContent = fmt(royAnnual);
  document.getElementById('royAnnualSub').textContent =
    `??${fmt(royMonthly)} Г— 12к°ңмӣ” В· MST ?пҝҪмҡ© ?пҝҪмқҙ??${Math.round(mstWafers).toLocaleString()}????;

  document.getElementById('royaltyExplain').innerHTML = `
    <span class="hl">${fmt(wasp)}</span> (ASP) Г— 
    <span class="hl">${Math.round(mstWafers).toLocaleString()}??/span>/??Г— 
    <span class="hl">${(roy*100).toFixed(1)}%</span> лЎңм—ҙ??= 
    <span class="hl">${fmt(royMonthly)}/??/span><br>
    ?пҝҪк°„ <span class="hl">${fmt(royAnnual)}</span> В· 
    ?пҝҪмңЁ ?пҝҪмқө ?пҝҪпҝҪ?лЎңм—ҙ??л№„мңЁ: <span class="hl">${yld > 0 ? (roy/yld*100).toFixed(0) : '??}%</span>
  `;

  // мұ„мӮ°???пҝҪлӢЁ
  const vm = document.getElementById('viabilityMsg');
  if (netGainMonth > 0) {
    vm.className = 'viability good';
    vm.innerHTML = `??<strong>мұ„мӮ°???пҝҪнҳё</strong>: ?пҝҪмңЁ к°ңм„  ?пҝҪмқө(${fmt(yieldGainMonth)}/????лЎңм—ҙ??${fmt(royMonthly)}/??ліҙлӢӨ <strong>${fmt(netGainMonth)}/??/strong> ?пҝҪлӢҲ?? ?пҝҪмЎ°???пҝҪмһҘ?пҝҪм„ң MST ?пҝҪмһ…??кІҪм ң?пҝҪмңјпҝҪ??пҝҪлҰ¬??`;
  } else {
    vm.className = 'viability warn';
    vm.innerHTML = `?пҝҪпёҸ <strong>лЎңм—ҙ?пҝҪпҝҪ? ?пҝҪмңЁ ?пҝҪмқө мҙҲкіј</strong>: ?пҝҪлҠҘ к°ңм„ (${(perf*100).toFixed(0)}%) ?пҝҪпҝҪ? ???пҝҪпҝҪ? ?пҝҪмңЁ к°ңм„ ???пҝҪмҡ”?пҝҪлӢҲ??`;
  }

  // ?пҝҪлҰ„ пҝҪ?
  const maxVal = Math.max(mstRevMonth*12, yieldAnnual, royAnnual, 1);
  document.getElementById('flowRows').innerHTML = [
    { label:'MST ?пҝҪмҡ© пҝҪ?л§Өм¶ң', val: mstRevMonth*12, color:'#60a5fa' },
    { label:'?пҝҪмңЁ к°ңм„  м¶”пҝҪ??пҝҪмқө', val: yieldAnnual, color:'#34d399' },
    { label:'Atomera лЎңм—ҙ??, val: royAnnual, color:'#fbbf24' },
    { label:'?пҝҪмЎ°?????пҝҪмқөкё°м—¬', val: Math.max(0,netAnnual), color: netAnnual>=0 ? '#6ee7b7':'#f87171' },
  ].map(r => `
    <div class="flow-row">
      <div class="flow-label">${r.label}</div>
      <div class="flow-bar-bg">
        <div class="flow-bar-fill" style="width:${Math.max(2,(r.val/maxVal*100))}%;background:${r.color}">
          <span class="flow-bar-val">${fmt(r.val)}</span>
        </div>
      </div>
      <div class="flow-amount" style="color:${r.color}">${fmt(r.val)}</div>
    </div>
  `).join('');

  // ?пҝҪмӮ¬ ?пҝҪмқҙпҝҪ?
  renderCompanyTable(roy);
}

function renderCompanyTable(globalRoy) {
  const rows = COMPANIES.map(c => {
    const mstW = c.wspm * (c.adopt/100);
    const monthly = mstW * c.wasp * globalRoy;
    const annual = monthly * 12;
    return { ...c, monthly, annual };
  });
  const total = rows.reduce((s,r) => s + r.annual, 0);

  let html = `<table style="width:100%;border-collapse:collapse;font-size:12px;min-width:500px">
    <thead>
      <tr style="border-bottom:1px solid var(--border)">
